apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../runtimes/vllm-cuda-template.yaml
  - ../../runtimes/vllm-rocm-template.yaml
  - ../../runtimes/vllm-gaudi-template.yaml
  - ../../runtimes/vllm-spyre-s390x-template.yaml
  - ../../runtimes/vllm-spyre-x86-template.yaml
  - ../../runtimes/vllm-spyre-ppc64le-template.yaml

nameSuffix: -fast-1

labels:
  - pairs:
      app: odh-dashboard
      app.kubernetes.io/part-of: odh-dashboard
    includeSelectors: true

patches:
  - target:
      kind: Template
    patch: |-
      - op: add
        path: /metadata/annotations/opendatahub.io~1runtime-support
        value: "Tech Preview - Unsupported"
      - op: add
        path: /objects/0/metadata/annotations/opendatahub.io~1runtime-support
        value: "Tech Preview - Unsupported"
  - target: { kind: Template, name: vllm-cuda-runtime-template }
    patch: |-
      - op: replace
        path: /objects/0/metadata/name
        value: vllm-cuda-runtime-fast-1
  - target: { kind: Template, name: vllm-rocm-runtime-template }
    patch: |-
      - op: replace
        path: /objects/0/metadata/name
        value: vllm-rocm-runtime-fast-1
  - target: { kind: Template, name: vllm-gaudi-runtime-template }
    patch: |-
      - op: replace
        path: /objects/0/metadata/name
        value: vllm-gaudi-runtime-fast-1
  - target: { kind: Template, name: vllm-spyre-s390x-runtime-template }
    patch: |-
      - op: replace
        path: /objects/0/metadata/name
        value: vllm-spyre-s390x-runtime-fast-1
  - target: { kind: Template, name: vllm-spyre-x86-runtime-template }
    patch: |-
      - op: replace
        path: /objects/0/metadata/name
        value: vllm-spyre-x86-runtime-fast-1
  - target: { kind: Template, name: vllm-spyre-ppc64le-runtime-template }
    patch: |-
      - op: replace
        path: /objects/0/metadata/name
        value: vllm-spyre-ppc64le-runtime-fast-1
