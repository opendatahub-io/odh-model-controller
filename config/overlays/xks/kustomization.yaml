apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Match KServe odh-xks: apply namespace to overlay-owned resources (e.g. Certificate).
namespace: opendatahub

resources:
- ../../base
- cert-manager/

configMapGenerator:
- name: odh-model-controller-parameters
  behavior: merge
  envs:
  - params.env

generatorOptions:
  disableNameSuffixHash: true

replacements:
- source:
    kind: ConfigMap
    version: v1
    name: odh-model-controller-parameters
    fieldPath: data.nim-state
  targets:
  - select:
      kind: Deployment
      name: odh-model-controller
    fieldPaths:
    - spec.template.spec.containers.[name=manager].env.[name=NIM_STATE].value
- source:
    kind: ConfigMap
    version: v1
    name: odh-model-controller-parameters
    fieldPath: data.modelregistry-state
  targets:
  - select:
      kind: Deployment
      name: odh-model-controller
    fieldPaths:
    - spec.template.spec.containers.[name=manager].env.[name=MODELREGISTRY_STATE].value

# Variable substitution for Certificate issuer/DNS (same pattern as KServe odh-xks).
vars:
- name: NAMESPACE
  objref:
    apiVersion: v1
    kind: ConfigMap
    name: odh-model-controller-parameters
  fieldref:
    fieldpath: data.NAMESPACE
- name: ISSUER_REF_GROUP
  objref:
    apiVersion: v1
    kind: ConfigMap
    name: odh-model-controller-parameters
  fieldref:
    fieldpath: data.ISSUER_REF_GROUP
- name: ISSUER_REF_KIND
  objref:
    apiVersion: v1
    kind: ConfigMap
    name: odh-model-controller-parameters
  fieldref:
    fieldpath: data.ISSUER_REF_KIND
- name: ISSUER_REF_NAME
  objref:
    apiVersion: v1
    kind: ConfigMap
    name: odh-model-controller-parameters
  fieldref:
    fieldpath: data.ISSUER_REF_NAME

configurations:
- params.yaml

patches:
- path: patches/delete-model-serving-api-deployment.yaml
- path: patches/delete-model-serving-api-service.yaml
- path: patches/delete-model-serving-api-serviceaccount.yaml
- path: patches/delete-model-serving-api-clusterrole.yaml
- path: patches/delete-model-serving-api-clusterrolebinding.yaml
- path: patches/delete-prometheus-metrics-service.yaml
- path: patches/delete-prometheus-clusterrole.yaml
- path: patches/delete-nim-crd.yaml
- path: patches/delete-nim-editor-role.yaml
- path: patches/delete-nim-viewer-role.yaml
- path: patches/delete-proxy-role.yaml
- path: patches/delete-proxy-rolebinding.yaml
- path: patches/delete-metrics-reader.yaml
- path: patches/delete-validating-webhook.yaml
- path: manager_xks_env_patch.yaml
  target:
    group: apps
    kind: Deployment
    name: odh-model-controller
    version: v1
- path: patches/mutating-webhooks-xks.yaml
  target:
    group: admissionregistration.k8s.io
    kind: MutatingWebhookConfiguration
    name: mutating.odh-model-controller.opendatahub.io
    version: v1
- path: patches/remove-openshift-rbac.yaml
  target:
    group: rbac.authorization.k8s.io
    kind: ClusterRole
    name: odh-model-controller-role
    version: v1
- target:
    kind: Template
  patch: |-
    $patch: delete
    apiVersion: template.openshift.io/v1
    kind: Template
    metadata:
      name: placeholder
- target:
    kind: ServiceMonitor
  patch: |-
    $patch: delete
    apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: placeholder
- target:
    kind: Service
    name: odh-model-controller-webhook-service
    namespace: opendatahub
  patch: |-
    - op: remove
      path: /metadata/annotations/service.beta.openshift.io~1serving-cert-secret-name
# Swap OpenShift service-CA injection for cert-manager (KServe odh-xks pattern).
- target:
    group: admissionregistration.k8s.io
    kind: MutatingWebhookConfiguration
    name: mutating.odh-model-controller.opendatahub.io
  patch: |-
    - op: remove
      path: /metadata/annotations/service.beta.openshift.io~1inject-cabundle
    - op: add
      path: /metadata/annotations/cert-manager.io~1inject-ca-from
      value: "$(NAMESPACE)/odh-model-controller-webhook"
