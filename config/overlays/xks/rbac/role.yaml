apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: odh-model-controller-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  - serviceaccounts
  verbs:
  - create
  - get
  - list
  - watch
- apiGroups:
  - infrastructure.opendatahub.io
  resources:
  - hardwareprofiles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - serving.kserve.io
  resources:
  - inferenceservices
  - llminferenceservices
  verbs:
  - get
  - list
  - watch
