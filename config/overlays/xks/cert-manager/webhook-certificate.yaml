# Certificate for the OMC webhook server on xKS.
# Issued by the OpenDataHub CA ClusterIssuer (same pattern as KServe odh-xks).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: odh-model-controller-webhook
spec:
  commonName: odh-model-controller-webhook-service.$(NAMESPACE).svc
  dnsNames:
    - odh-model-controller-webhook-service.$(NAMESPACE).svc
    - odh-model-controller-webhook-service.$(NAMESPACE).svc.cluster.local
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  issuerRef:
    name: $(ISSUER_REF_NAME)
    kind: $(ISSUER_REF_KIND)
    group: $(ISSUER_REF_GROUP)
  # Must match the secret mounted by the controller Deployment.
  secretName: odh-model-controller-webhook-cert
