apiVersion: template.openshift.io/v1
kind: Template
metadata:
  labels:
    opendatahub.io/dashboard: 'true'
    opendatahub.io/ootb: 'true'
  annotations:
    description: AutoGluon ServingRuntime for tabular and time series inference
    openshift.io/display-name: AutoGluon ServingRuntime for KServe
    openshift.io/provider-display-name: Red Hat, Inc.
    tags: rhods,rhoai,kserve,servingruntime
    template.openshift.io/documentation-url: https://github.com/opendatahub-io/kserve
    template.openshift.io/long-description: This template defines resources needed to deploy AutoGluon ServingRuntime with KServe in Red Hat OpenShift AI for tabular and time series model inference
    opendatahub.io/modelServingSupport: '["single"]'
    opendatahub.io/apiProtocol: 'REST'
    opendatahub.io/model-type: '["predictive"]'
  name: autogluon-runtime-template
objects:
  - apiVersion: serving.kserve.io/v1alpha1
    kind: ServingRuntime
    metadata:
      name: autogluon-runtime
      annotations:
        openshift.io/display-name: AutoGluon ServingRuntime for KServe
        opendatahub.io/runtime-version: 'v0.1.0'
      labels:
        opendatahub.io/dashboard: 'true'
    spec:
      annotations:
        opendatahub.io/kserve-runtime: 'autogluon'
        prometheus.io/port: '8080'
        prometheus.io/path: /metrics
        monitoring.opendatahub.io/scrape: 'true'
      multiModel: false
      protocolVersions:
        - v1
        - v2
      supportedModelFormats:
        - autoSelect: true
          name: autogluon
          version: "1"
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: kserve-container
          image: $(autogluon-image)
          args:
            - "--model_name={{.Name}}"
            - "--model_dir=/mnt/models"
            - "--http_port=8080"
          ports:
            - containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /v2/models/{{.Name}}/ready
              port: 8080
            periodSeconds: 10
            failureThreshold: 60
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /v2/models/{{.Name}}/ready
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
