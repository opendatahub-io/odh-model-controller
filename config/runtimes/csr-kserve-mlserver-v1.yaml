apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: csr-kserve-mlserver-v1
  labels:
    opendatahub.io/managed: "true"
  annotations:
    opendatahub.io/version: "1.0.0"
    opendatahub.io/template-display-name: "MLServer"
    opendatahub.io/runtime-version: "1.7.1"
    openshift.io/display-name: MLServer ServingRuntime for KServe
    serving.kserve.io/server-type: mlserver
spec:
  annotations:
    opendatahub.io/kserve-runtime: "mlserver"
    prometheus.io/port: "8082"
    prometheus.io/path: /metrics
    monitoring.opendatahub.io/scrape: "true"
  containers:
    - name: kserve-container
      image: quay.io/opendatahub/mlserver:fast
      env:
        - name: MLSERVER_MODEL_IMPLEMENTATION
          value: "{{.Labels.modelClass}}"
        - name: MLSERVER_HTTP_PORT
          value: "8080"
        - name: MLSERVER_MODELS_DIR
          value: /mnt/models
      startupProbe:
        initialDelaySeconds: 1
        periodSeconds: 1
        failureThreshold: 1
        exec:
          command:
            - /bin/sh
            - -c
            - |
              [ -n "$(ls -A /mnt/models 2>/dev/null)" ]
      readinessProbe:
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3
        timeoutSeconds: 5
        httpGet:
          path: /v2/models/{{.Name}}/ready
          port: 8080
      livenessProbe:
        initialDelaySeconds: 20
        periodSeconds: 10
        failureThreshold: 6
        timeoutSeconds: 5
        httpGet:
          path: /v2/models/{{.Name}}/ready
          port: 8080
      ports:
        - containerPort: 8080
          protocol: TCP
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        privileged: false
        runAsNonRoot: true
  protocolVersions:
    - v2
  multiModel: false
  supportedModelFormats:
    - name: sklearn
      version: "0"
    - name: sklearn
      version: "1"
    - name: xgboost
      version: "1"
    - name: xgboost
      version: "2"
    - name: lightgbm
      version: "3"
    - name: lightgbm
      version: "4"
    - name: onnx
      version: "1"
