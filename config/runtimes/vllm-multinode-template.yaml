apiVersion: template.openshift.io/v1
kind: Template
metadata:
  labels:
    opendatahub.io/dashboard: 'false'
    opendatahub.io/ootb: 'true'
  annotations:
    description: vLLM is a high-throughput and memory-efficient inference and serving engine for LLMs
    openshift.io/display-name: vLLM Multi-Node ServingRuntime for KServe
    openshift.io/provider-display-name: Red Hat, Inc.
    tags: rhods,rhoai,kserve,servingruntime,multi-node
    template.openshift.io/documentation-url: https://github.com/opendatahub-io/vllm
    template.openshift.io/long-description: This template defines resources needed to deploy vLLM Multi-Node ServingRuntime with KServe in Red Hat OpenShift AI
    opendatahub.io/modelServingSupport: '["single"]'
    opendatahub.io/apiProtocol: 'REST'
    opendatahub.io/model-type: '["generative"]'
  name: vllm-multinode-runtime-template
objects:
  - apiVersion: serving.kserve.io/v1alpha1
    kind: ServingRuntime
    metadata:
      name: vllm-multinode-runtime
      annotations:
        openshift.io/display-name: vLLM Multi-Node ServingRuntime for KServe
        opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
        opendatahub.io/runtime-version: 'v0.18.0'
      labels:
        opendatahub.io/dashboard: 'false'
    spec:
      annotations:
        multinode/executor-backend: 'mp'
        opendatahub.io/kserve-runtime: 'vllm'
        prometheus.io/port: '8080'
        prometheus.io/path: '/metrics'
      multiModel: false
      supportedModelFormats:
        - autoSelect: true
          name: vLLM
          priority: 2
      containers:
        - name: kserve-container
          image: $(vllm-cuda-image)
          args:
          - /mnt/models
          - --port=8080
          - --served-model-name={{.Name}}
          - --distributed-executor-backend=mp
          - --tensor-parallel-size=$(TENSOR_PARALLEL_SIZE)
          - --pipeline-parallel-size=$(PIPELINE_PARALLEL_SIZE)
          - --nnodes=$(PIPELINE_PARALLEL_SIZE)
          - --node-rank=0
          - --master-addr=$(POD_IP)
          - --master-port=$(MASTER_PORT)
          command:
          - vllm
          - serve
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: VLLM_NO_USAGE_STATS
              value: '1'
            - name: HOME
              value: /tmp
            - name: HF_HOME
              value: /tmp/hf_home
          resources:
            limits:
              cpu: '16'
              memory: 48Gi
            requests:
              cpu: '8'
              memory: 24Gi
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            failureThreshold: 120
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 30
            initialDelaySeconds: 20
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 10
            exec:
              command:
                - bash
                - -c
                - |
                  health_code=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" -X POST http://localhost:8080/v1/completions \
                    -H "Content-Type: application/json" \
                    -d '{"model":"'"${MODEL_NAME}"'","prompt":"healthcheck","max_tokens":1}')
                  if [[ "${health_code}" != "200" ]]; then
                    echo "Unhealthy - inference check failed (HTTP ${health_code})."
                    exit 1
                  fi
          readinessProbe:
            failureThreshold: 2
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 15
            httpGet:
              path: /health
              port: 8080
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 12Gi
      workerSpec:
        pipelineParallelSize: 2
        tensorParallelSize: 1
        containers:
          - name: worker-container
            image: $(vllm-cuda-image)
            args:
            - /mnt/models
            - --port=8080
            - --served-model-name=$(ISVC_NAME)
            - --distributed-executor-backend=mp
            - --tensor-parallel-size=$(TENSOR_PARALLEL_SIZE)
            - --pipeline-parallel-size=$(PIPELINE_PARALLEL_SIZE)
            - --nnodes=$(PIPELINE_PARALLEL_SIZE)
            - --master-addr=$(HEAD_SVC).$(POD_NAMESPACE).svc.cluster.local
            - --master-port=$(MASTER_PORT)
            - --headless
            command:
              - bash
              - -c
              - |
                ALL_IPS=$(getent hosts ${WORKER_SVC} | awk '{print $1}' | sort -u)
                export NODE_RANK=$(echo "$ALL_IPS" | grep -n "^${POD_IP}$" | head -1 | cut -d: -f1 | awk '{print $1}')
                echo "NODE_RANK: $NODE_RANK"
                exec vllm serve "$@" --node-rank=${NODE_RANK}
              - -- # args separator: ensures args are passed as $1,$2,.. to "$@"
            env:
              - name: HF_HOME
                value: /tmp/hf_home
              - name: MASTER_PORT
                value: "29500"
              - name: POD_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.name
              - name: POD_NAMESPACE
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              - name: POD_IP
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
            resources:
              limits:
                cpu: '16'
                memory: 48Gi
              requests:
                cpu: '8'
                memory: 24Gi
            volumeMounts:
              - name: shm
                mountPath: /dev/shm
            startupProbe:
              failureThreshold: 120
              periodSeconds: 30
              successThreshold: 1
              timeoutSeconds: 30
              initialDelaySeconds: 20
              exec:
                command:
                  - bash
                  - -c
                  - |
                    model_health_check=$(curl -s ${HEAD_SVC}.${POD_NAMESPACE}.svc.cluster.local:8080/v1/models | grep -q "\"id\":\"${ISVC_NAME}\"" && echo true || echo false)
                    if [[ "${model_health_check}" == "false" ]]; then
                      echo "Unhealthy - vLLM Runtime Health Check failed."
                      exit 1
                    fi
            livenessProbe:
              failureThreshold: 3
              periodSeconds: 30
              successThreshold: 1
              timeoutSeconds: 10
              exec:
                command:
                  - bash
                  - -c
                  - |
                    health_code=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" -X POST http://${HEAD_SVC}.${POD_NAMESPACE}.svc.cluster.local:8080/v1/completions \
                      -H "Content-Type: application/json" \
                      -d '{"model":"'"${ISVC_NAME}"'","prompt":"healthcheck","max_tokens":1}')
                    if [[ "${health_code}" != "200" ]]; then
                      echo "Unhealthy - inference check failed (HTTP ${health_code})."
                      exit 1
                    fi
            readinessProbe:
              failureThreshold: 2
              periodSeconds: 5
              successThreshold: 1
              timeoutSeconds: 15
              exec:
                command:
                  - bash
                  - -c
                  - |
                    model_health_check=$(curl -s ${HEAD_SVC}.${POD_NAMESPACE}.svc.cluster.local:8080/v1/models | grep -q "\"id\":\"${ISVC_NAME}\"" && echo true || echo false)
                    if [[ "${model_health_check}" == "false" ]]; then
                      echo "Not Ready - vLLM Runtime Health Check failed."
                      exit 1
                    fi
        volumes:
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 12Gi
