apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: csr-kserve-ovms-v1
  labels:
    opendatahub.io/managed: "true"
  annotations:
    opendatahub.io/version: "1.0.0"
    opendatahub.io/template-display-name: "OpenVINO Model Server"
    opendatahub.io/runtime-version: "v2026.1.0"
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    openshift.io/display-name: OpenVINO Model Server
spec:
  annotations:
    opendatahub.io/kserve-runtime: "ovms"
    prometheus.io/port: "8888"
    prometheus.io/path: /metrics
  multiModel: false
  supportedModelFormats:
    - name: openvino_ir
      version: opset13
      autoSelect: true
    - name: onnx
      version: "1"
    - name: tensorflow
      version: "1"
      autoSelect: true
    - name: tensorflow
      version: "2"
      autoSelect: true
    - name: paddle
      version: "2"
      autoSelect: true
    - name: pytorch
      version: "2"
      autoSelect: true
  protocolVersions:
    - v2
    - grpc-v2
  containers:
    - name: kserve-container
      image: quay.io/opendatahub/openvino_model_server:2025.1-release
      args:
        - "--model_name={{.Name}}"
        - "--port=8001"
        - "--rest_port=8888"
        - "--model_path=/mnt/models"
        - "--file_system_poll_wait_seconds=0"
        - "--metrics_enable"
      ports:
        - containerPort: 8888
          protocol: TCP
