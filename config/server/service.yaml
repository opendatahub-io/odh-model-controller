apiVersion: v1
kind: Service
metadata:
  name: model-serving-api
  namespace: system
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: model-serving-api-tls
spec:
  ports:
    - name: https
      port: 443
      protocol: TCP
      targetPort: 8443
    - name: metrics
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: model-serving-api
