apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: model-serving-api-metrics
  namespace: system
  labels:
    app: model-serving-api
spec:
  endpoints:
    - path: /metrics
      port: metrics
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
  selector:
    matchLabels:
      app: model-serving-api