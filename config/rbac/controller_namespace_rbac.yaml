# Role + RoleBinding in the controller's own namespace for
# managing ray-ca cert secrets and other controller-local resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: odh-model-controller-self
  namespace: system
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: odh-model-controller-self
  namespace: system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: odh-model-controller-self
subjects:
- kind: ServiceAccount
  name: odh-model-controller
  namespace: system