name: Check ODH Image Tags

on:
  pull_request:
    branches: [incubating, main]
    paths:
      - "config/base/params.env"

jobs:
  check-image-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Determine expected tag
        id: expected-tag
        run: |
          if [ "${{ github.base_ref }}" == "incubating" ]; then
            EXPECTED_TAG="fast"
          elif [[ "${{ github.base_ref }}" == "main" ]]; then
            EXPECTED_TAG="stable"
          elif [[ "${GITHUB_REF}" == refs/tags/odh-v* ]]; then
            EXPECTED_TAG="${GITHUB_REF#refs/tags/}"
          else
            echo "Unknown destination branch: ${{ github.base_ref }} or tag: ${GITHUB_REF}"
            exit 1
          fi
          echo "EXPECTED_TAG=$EXPECTED_TAG" >> $GITHUB_ENV

      - name: Verify image tags
        run: |
          EXPECTED_TAG="${{ env.EXPECTED_TAG }}"
          FAILED=0

          for IMAGE in odh-model-controller odh-model-serving-api; do
            IMAGE_TAG=$(grep "^${IMAGE}=" config/base/params.env | cut -d '=' -f 2 | cut -d ':' -f 2 | tr -d ' ')
            if [[ -z "$IMAGE_TAG" ]]; then
              echo "WARNING: ${IMAGE} not found in params.env, skipping"
              continue
            fi
            # Strip optional image-name prefix from tag (e.g. odh-model-serving-api-fast -> fast)
            # to handle images published as tag prefixes under another repo
            STRIPPED_TAG="${IMAGE_TAG#${IMAGE}-}"
            if [[ ! "$STRIPPED_TAG" =~ ^"$EXPECTED_TAG"(\.[0-9]+)?$ ]]; then
              echo "Image tag mismatch for ${IMAGE}! Expected '$EXPECTED_TAG' (or '${IMAGE}-${EXPECTED_TAG}') but found '$IMAGE_TAG'"
              FAILED=1
            else
              echo "Image tag for ${IMAGE} ('$IMAGE_TAG') is correct."
            fi
          done

          if [[ "$FAILED" -eq 1 ]]; then
            exit 1
          fi
