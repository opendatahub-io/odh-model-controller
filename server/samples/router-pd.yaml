# LLMInferenceServiceConfig: Router / Scheduling Policy for P/D Disaggregation
#
# This template defines a routing and scheduling policy for prefill/decode (P/D)
# disaggregated inference topologies. It uses the disagg-profile-handler to route
# requests to separate prefill and decode pools based on request phase.
#
# Auto-injected defaults:
#   The scheduler infrastructure (EPP deployment, tokenizer sidecar, InferencePool)
#   and HTTPRoute rules are provided by auto-injected configs
#   (kserve-config-llm-scheduler, kserve-config-llm-router-route).
#   This config only needs to specify the EndpointPickerConfig (scoring plugins,
#   filters, and scheduling profiles) which is NOT auto-injected.
#
# How P/D routing works:
#   The disagg-profile-handler inspects each request and selects the appropriate
#   scheduling profile (prefill or decode). Each profile applies its own filter
#   to restrict candidates to the correct pool, then scores using the same plugins.
#
# Available scheduler plugins (see router.yaml for full list):
#   Handlers:
#     - disagg-headers-handler: inspects request headers for P/D routing metadata
#     - disagg-profile-handler: routes to separate prefill/decode profiles
#   Deciders:
#     - always-disagg-pd-decider: always disaggregates requests into P/D phases
#   Filters (P/D specific):
#     - prefill-filter: restricts candidates to prefill pool pods
#     - decode-filter: restricts candidates to decode pool pods
#
# To customize for your infrastructure:
#   1. Adjust plugin weights independently for prefill and decode profiles
#   2. Consider higher prefix-cache-scorer weight for prefill (long shared prompts)
#   3. Consider higher active-request-scorer weight for decode (latency-sensitive)
#
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  # Name must be unique within the namespace.
  # Choose a descriptive name that reflects the scheduling policy.
  name: pd-scheduling-policy
  labels:
    # This label classifies the config for the UI deployment wizard.
    # The UI filters available configs by this label value.
    opendatahub.io/config-type: router
  annotations:
    # JSON array of topology types this router is compatible with.
    # Annotations support arbitrary values, unlike labels (max 63 chars, no brackets).
    opendatahub.io/supported-topologies: '["workload-single-node-pd", "workload-multi-node-data-parallel-pd"]'
    # Human-readable description shown in the UI when selecting a routing policy.
    description: >-
      Disaggregated prefill/decode scheduling policy with separate profiles
      for prefill and decode pools, using prefix cache, queue, KV cache
      utilization, and active request scoring.
spec:
  router:
    gateway: { }
    route: { }
    scheduler:
      config:
        inline:
          apiVersion: llm-d.ai/v1alpha1
          kind: EndpointPickerConfig
          plugins:
            - type: disagg-headers-handler
            - type: always-disagg-pd-decider
            - type: disagg-profile-handler
              parameters:
                deciderPluginName: always-disagg-pd-decider
            - type: prefill-filter
            - type: decode-filter
            - type: prefix-cache-scorer
            - type: queue-scorer
            - type: kv-cache-utilization-scorer
            - type: active-request-scorer
          schedulingProfiles:
            # Prefill profile — routes prompt-processing requests to prefill pool pods.
            - name: prefill
              plugins:
                - pluginRef: prefill-filter
                - pluginRef: prefix-cache-scorer
                  weight: 3
                - pluginRef: queue-scorer
                  weight: 2
                - pluginRef: kv-cache-utilization-scorer
                  weight: 2
            # Decode profile — routes token-generation requests to decode pool pods.
            - name: decode
              plugins:
                - pluginRef: decode-filter
                - pluginRef: active-request-scorer
                  weight: 2
                - pluginRef: prefix-cache-scorer
                  weight: 3
